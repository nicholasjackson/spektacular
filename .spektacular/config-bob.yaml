agent:
  command: bob
  args: ["--output-format", "stream-json"]
  allowed_tools: []
  disallowed_tools: []
  dangerously_skip_permissions: false
complexity:
  thresholds:
    complex: 0.8
    medium: 0.6
    simple: 0.3
models:
  default: premium
  tiers:
    complex: premium
    medium: premium
    simple: premium
output:
  format: markdown
  include_metadata: true
debug:
  enabled: true
