version = "1.0"

[metadata]
author_name = "Jumppad Labs"
author_email = "team@jumppad.dev"
difficulty_explanation = "Multi-step CLI workflow requiring the agent to drive the spektacular plan workflow from start to finish, retrieve referenced skills, spawn sub-agents during discovery, and produce three substantive artefact files"
category = "agent-orchestration"
tags = ["spektacular", "plan-workflow", "multi-step", "cli", "sub-agents", "skills"]

[agent]
timeout_sec = 900.0

[verifier]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240

[[artifacts]]
source = "/app/.spektacular"
destination = "spektacular"
