version = "1.0"

[metadata]
author_name = "Jumppad Labs"
author_email = "team@jumppad.dev"
difficulty_explanation = "Multi-step CLI workflow requiring the agent to follow JSON instructions, run commands, and progress through all 10 spec steps"
category = "agent-orchestration"
tags = ["spektacular", "spec-workflow", "multi-step", "cli"]

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240

[[artifacts]]
source = "/app/.spektacular"
destination = "spektacular"
